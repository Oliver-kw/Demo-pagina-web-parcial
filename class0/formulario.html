<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="formulario.css">
    <meta charset="UTF-8">
    <title>Solicitud de Renta</title>
    
</head>

<body>


<form id="Miformulario">
    <h2>Solicitud de Renta</h2>

    <label>Nombre</label>
    <input name="Nombre"  type="text" id="Nombre" required placeholder="Nombre">
    <br>

    <label>Apellido</label>
    <input name="Apellido"  type="text" id="Apellido" required placeholder="Apellido">
    <br>

    <label>Direccion</label>
    <input name="Direccion" type="text" id="Direccion" required placeholder="Direccion">
    <br>

    <label>Correo</label>
    <input name="Correo" type="email" id="Correo" required placeholder="Correo">
    <br>

    <label>Telefono</label>
    <input name="Telefono" type="text" id="Telefono" required placeholder="Numero">
    <br>



    <button type="submit" onclick="validar(event)">Registrar</button>
</form>

<p id="mensaje"></p>

<script src="app.js"></script>


</body>
</html>
